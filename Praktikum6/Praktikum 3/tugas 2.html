<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Pendaftaran</title>

<style>
    .kotak {
        width: 420px;
        border: 2px solid black;
        padding: 15px;
        margin: 50px auto;
    }
    label {
        display: inline-block;
        width: 110px;
    }
</style>

<script>
function validasi() {
    var nama = document.forms["formDaftar"]["nama"].value;
    var email = document.forms["formDaftar"]["email"].value;
    var gender = document.querySelector('input[name="gender"]:checked');
    var hobi = document.querySelectorAll('input[name="hobi"]:checked');
    var kota = document.forms["formDaftar"]["kota"].value;
    var foto = document.forms["formDaftar"]["foto"].value;

    if (nama == "") {
        alert("semua elemen harus diisi yaa!");
        return false;
    }

    if (email == "") {
        alert("Email harus diisi!");
        return false;
    }

    if (!gender) {
        alert("Pilih jenis kelamin!");
        return false;
    }

    if (hobi.length == 0) {
        alert("Pilih minimal 1 hobi!");
        return false;
    }

    if (kota == "") {
        alert("Pilih kota!");
        return false;
    }

    if (foto == "") {
        alert("Upload foto terlebih dahulu!");
        return false;
    }

    return true;
}
</script>

</head>
<body>

<div class="kotak">
<form name="formDaftar" method="POST" enctype="multipart/form-data" onsubmit="return validasi()">

    <div>
        <label>Nama:</label>
        <input type="text" name="nama">
    </div>
    <br>

    <div>
        <label>Email:</label>
        <input type="email" name="email">
    </div>
    <br>

    <div>
        <label>Jenis Kelamin:</label>
        <input type="radio" name="gender" value="L"> Laki-laki
        <input type="radio" name="gender" value="P"> Perempuan
    </div>
    <br>

    <div>
        <label>Hobi:</label>
        <input type="checkbox" name="hobi" value="Musik"> Musik
        <input type="checkbox" name="hobi" value="Olahraga"> Olahraga
    </div>
    <br>

    <div>
        <label>Pilih Kota:</label>
        <select name="kota">
            <option value="">--Pilih--</option>
            <option value="Jakarta" selected>Jakarta</option>
            <option value="Bandung">Bandung</option>
            <option value="Surabaya">Surabaya</option>
        </select>
    </div>
    <br>

    <div>
        <label>Upload Foto:</label>
        <input type="file" name="foto">
    </div>
    <br>

    <div>
        <button type="submit">Daftar</button>
    </div>

</form>
</div>

</body>
</html>
